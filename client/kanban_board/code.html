<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynblath | Kanban Board</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container-high": "#e0e9f5", "outline-variant": "#c2c6d6", "primary-fixed-dim": "#adc6ff", "surface-container-low": "#ecf4ff", "surface-container": "#e6effa", "secondary": "#5a5f66", "background": "#f7f9ff", "tertiary": "#006226", "surface-dim": "#d2dbe6", "on-primary": "#ffffff", "error": "#ba1a1a", "primary": "#0051ae", "on-surface-variant": "#424753", "surface": "#f7f9ff", "surface-container-highest": "#dae3ef", "on-surface": "#141c25", "outline": "#727785", "error-container": "#ffdad6", "surface-container-lowest": "#ffffff", "surface-variant": "#dae3ef", "primary-container": "#0969da", "on-background": "#141c25", "secondary-container": "#dee3eb" }, borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" }, fontFamily: { headline: ["Inter"], body: ["Inter"] } } } }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .625rem 1rem;
            border-radius: .5rem;
            transition: all .15s;
            font-size: .875rem;
            font-weight: 600;
            color: #475569;
            text-decoration: none;
        }

        .sidebar-link:hover {
            background: #f1f5f9;
        }

        .sidebar-link.active {
            background: rgba(219, 234, 254, .6);
            color: #1d4ed8;
        }

        .glass-header {
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(24px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .task-card {
            transition: box-shadow .2s, transform .2s;
        }

        .task-card:hover {
            box-shadow: 0 8px 24px rgba(20, 28, 37, .08);
        }

        .task-card.dragging {
            opacity: .5;
            transform: rotate(2deg);
        }

        .column-drop-zone.drag-over {
            background: rgba(0, 81, 174, .06);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0051ae, #0969da);
            color: #fff;
            border: none;
            border-radius: .5rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: transform .15s;
        }

        .btn-primary:hover {
            transform: scale(.98);
        }

        .input-field {
            width: 100%;
            padding: .75rem 1rem;
            background: #ecf4ff;
            border: none;
            border-radius: .5rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            color: #141c25;
            transition: background .2s;
        }

        .input-field:focus {
            background: #dae3ef;
        }

        .priority-badge-LOW {
            background: #f1f5f9;
            color: #475569;
        }

        .priority-badge-MEDIUM {
            background: #fff7ed;
            color: #c2410c;
        }

        .priority-badge-HIGH {
            background: #fee2e2;
            color: #b91c1c;
        }

        .priority-badge-URGENT {
            background: #fecaca;
            color: #7f1d1d;
        }
    </style>
</head>

<body class="bg-background text-on-surface flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <main class="ml-64 flex-1 flex flex-col min-h-0">
        <!-- Top Bar -->
        <header class="glass-header px-6 py-3 flex items-center justify-between flex-shrink-0 z-40">
            <div class="flex items-center gap-4">
                <a href="../project_dashboard/code.html"
                    class="flex items-center gap-1.5 text-sm font-semibold text-slate-500 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-sm">arrow_back</span> Projects
                </a>
                <span class="text-slate-300">/</span>
                <h1 class="text-base font-extrabold text-slate-900" id="project-name">Loading…</h1>
            </div>
            <div class="flex items-center gap-3">
                <!-- Search -->
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                    <input id="task-search" type="text" placeholder="Search tasks…"
                        class="pl-8 pr-4 py-2 text-sm bg-surface-container-low rounded-xl border-none outline-none text-slate-700 w-48 focus:w-64 transition-all"
                        oninput="renderBoard()" />
                </div>
                <!-- Priority filter -->
                <select id="filter-priority" onchange="renderBoard()"
                    class="text-xs px-3 py-2 rounded-xl bg-surface-container-low border-none outline-none font-semibold text-slate-600">
                    <option value="">All Priority</option>
                    <option value="LOW">Low</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="HIGH">High</option>
                    <option value="URGENT">Urgent</option>
                </select>
                <button onclick="openNewTaskModal(null)"
                    class="btn-primary px-4 py-2 text-sm flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-sm">add</span> Add Task
                </button>
            </div>
        </header>

        <!-- Board -->
        <div class="flex-1 overflow-x-auto overflow-y-hidden px-6 py-4">
            <div id="board" class="flex gap-5 h-full items-start min-w-max">
                <!-- Columns rendered by JS -->
            </div>
        </div>
    </main>

    <!-- Task Detail Modal -->
    <div id="task-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center"
        style="background:rgba(20,28,37,.45);backdrop-filter:blur(8px);">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl mx-4 flex flex-col" style="max-height:90vh;">
            <!-- Modal Header -->
            <div class="flex items-center justify-between px-8 pt-8 pb-4">
                <div class="flex items-center gap-2">
                    <select id="modal-status"
                        class="text-xs font-bold rounded-lg px-3 py-1.5 border-none outline-none cursor-pointer"
                        style="background:#ecf4ff;color:#1d4ed8;" onchange="updateTaskField('status', this.value)">
                        <option value="TODO">To Do</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="IN_REVIEW">In Review</option>
                        <option value="DONE">Done</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="deleteCurrentTask()"
                        class="text-red-400 hover:text-red-600 transition-colors p-1.5 rounded-lg hover:bg-red-50">
                        <span class="material-symbols-outlined text-lg">delete</span>
                    </button>
                    <button onclick="closeTaskModal()"
                        class="text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-100">
                        <span class="material-symbols-outlined text-lg">close</span>
                    </button>
                </div>
            </div>

            <div class="overflow-y-auto flex-1 px-8 pb-8 custom-scrollbar">
                <!-- Title -->
                <h2 id="modal-title" contenteditable="true"
                    class="text-2xl font-extrabold text-slate-900 mb-4 outline-none border-b-2 border-transparent focus:border-primary pb-1"
                    onblur="updateTaskField('title', this.textContent.trim())">Task Title</h2>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label
                            class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Priority</label>
                        <select id="modal-priority" class="input-field text-sm"
                            onchange="updateTaskField('priority', this.value)">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="URGENT">Urgent</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Type</label>
                        <select id="modal-type" class="input-field text-sm"
                            onchange="updateTaskField('type', this.value)">
                            <option value="TASK">Task</option>
                            <option value="BUG">Bug</option>
                            <option value="FEATURE">Feature</option>
                            <option value="IMPROVEMENT">Improvement</option>
                            <option value="EPIC">Epic</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Due
                            Date</label>
                        <input id="modal-due-date" type="date" class="input-field text-sm"
                            onchange="updateTaskField('due_date', this.value)" />
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Assignee</label>
                        <select id="modal-assignee" class="input-field text-sm"
                            onchange="updateTaskField('assignee_id', this.value)">
                            <option value="">Unassigned</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-6">
                    <label
                        class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Description</label>
                    <textarea id="modal-description" class="input-field resize-none text-sm" rows="4"
                        placeholder="Add a description…" onblur="updateTaskField('description', this.value)"></textarea>
                </div>

                <!-- Comments -->
                <div>
                    <h3 class="text-sm font-extrabold text-slate-900 mb-3">Comments</h3>
                    <div id="comments-list" class="space-y-3 mb-4"></div>
                    <div class="flex gap-3">
                        <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0 mt-0.5"
                            id="comment-avatar" style="background:linear-gradient(135deg,#0051ae,#0969da)">U</div>
                        <div class="flex-1 flex gap-2">
                            <input id="comment-input" class="input-field text-sm flex-1" placeholder="Write a comment…"
                                type="text" onkeydown="if(event.key==='Enter')submitComment()" />
                            <button onclick="submitComment()"
                                class="btn-primary px-4 py-2 text-sm flex-shrink-0">Post</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Task Modal -->
    <div id="new-task-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center"
        style="background:rgba(20,28,37,.45);backdrop-filter:blur(8px);">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md mx-4 p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-extrabold text-slate-900">New Task</h2>
                <button onclick="closeNewTaskModal()" class="text-slate-400 hover:text-slate-600"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <div id="new-task-error"
                class="hidden mb-4 bg-error-container text-red-800 text-sm font-semibold px-4 py-3 rounded-xl"></div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Title
                        *</label>
                    <input id="new-task-title" class="input-field" placeholder="What needs to be done?" type="text" />
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Status</label>
                        <select id="new-task-status" class="input-field">
                            <option value="TODO">To Do</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="IN_REVIEW">In Review</option>
                            <option value="DONE">Done</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Priority</label>
                        <select id="new-task-priority" class="input-field">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                            <option value="URGENT">Urgent</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Type</label>
                        <select id="new-task-type" class="input-field">
                            <option value="TASK" selected>Task</option>
                            <option value="BUG">Bug</option>
                            <option value="FEATURE">Feature</option>
                            <option value="IMPROVEMENT">Improvement</option>
                            <option value="EPIC">Epic</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Due
                            Date</label>
                        <input id="new-task-due" class="input-field" type="date" />
                    </div>
                </div>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Description</label>
                    <textarea id="new-task-desc" class="input-field resize-none" rows="2"
                        placeholder="Optional description…"></textarea>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button onclick="closeNewTaskModal()"
                        class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
                    <button id="create-task-btn" onclick="createTask()" class="btn-primary px-6 py-2.5 text-sm">Create
                        Task</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../auth.js"></script>
    <script src="../api.js"></script>
    <script>
        // ── State ──
        let allTasks = [];
        let projectId = null;
        let projectMembers = [];
        let currentTaskId = null;
        let newTaskDefaultStatus = 'TODO';

        const COLUMNS = [
            { status: 'TODO', label: 'To Do', color: '#94a3b8', bg: 'bg-slate-100', dot: 'bg-slate-400', countBg: 'bg-slate-100 text-slate-600' },
            { status: 'IN_PROGRESS', label: 'In Progress', color: '#3b82f6', bg: 'bg-blue-50', dot: 'bg-blue-500', countBg: 'bg-blue-100 text-blue-700' },
            { status: 'IN_REVIEW', label: 'In Review', color: '#f97316', bg: 'bg-orange-50', dot: 'bg-orange-400', countBg: 'bg-orange-100 text-orange-700' },
            { status: 'DONE', label: 'Done', color: '#006226', bg: 'bg-green-50', dot: 'bg-green-600', countBg: 'bg-green-100 text-green-700' },
        ];

        // ── Init ──
        document.addEventListener('DOMContentLoaded', async () => {
            if (!requireAuth()) return;

            renderSidebarEl();

            const user = AuthService.getUser();
            const initial = (user.fullName || user.email || 'U')[0].toUpperCase();
            document.getElementById('comment-avatar').textContent = initial;

            projectId = localStorage.getItem('currentProjectId');
            if (!projectId) {
                // Try to load first project
                try {
                    const workspaces = await ApiService.getWorkspaces();
                    if (workspaces?.length) {
                        const projects = await ApiService.getProjects(workspaces[0].id);
                        if (projects?.length) {
                            projectId = (Array.isArray(projects) ? projects : projects.content || [])[0]?.id;
                            if (projectId) localStorage.setItem('currentProjectId', projectId);
                        }
                    }
                } catch (e) { }
            }

            if (!projectId) {
                document.getElementById('project-name').textContent = 'No Project';
                renderEmptyBoard();
                return;
            }

            await Promise.all([loadProject(), loadTasks(), loadMembers()]);
        });

        async function loadProject() {
            try {
                const p = await ApiService.getProject(projectId);
                if (p) document.getElementById('project-name').textContent = p.name || 'Project';
            } catch (e) { }
        }

        async function loadTasks() {
            try {
                const data = await ApiService.getTasks(projectId);
                allTasks = Array.isArray(data) ? data : (data?.content || []);
                renderBoard();
            } catch (e) {
                console.error('loadTasks:', e);
                allTasks = [];
                renderBoard();
            }
        }

        async function loadMembers() {
            try {
                const data = await ApiService.getProjectMembers(projectId);
                projectMembers = Array.isArray(data) ? data : (data?.content || []);
                updateAssigneeSelects();
            } catch (e) { }
        }

        function updateAssigneeSelects() {
            const options = '<option value="">Unassigned</option>' +
                projectMembers.map(m => `<option value="${m.user_id}">${escHtml(m.full_name || m.email || m.user_id)}</option>`).join('');
            document.getElementById('modal-assignee').innerHTML = options;
        }

        // ── Board Render ──
        function renderBoard() {
            const search = (document.getElementById('task-search').value || '').toLowerCase();
            const priorityF = document.getElementById('filter-priority').value;

            let filtered = allTasks.filter(t => {
                if (search && !t.title.toLowerCase().includes(search)) return false;
                if (priorityF && t.priority !== priorityF) return false;
                return true;
            });

            const board = document.getElementById('board');
            board.innerHTML = COLUMNS.map(col => {
                const tasks = filtered.filter(t => t.status === col.status);
                return columnHTML(col, tasks);
            }).join('') + addColumnBtn();

            // Wire drag-drop
            setupDragDrop();
        }

        function renderEmptyBoard() {
            document.getElementById('board').innerHTML = `
        <div class="flex items-center justify-center w-full h-full col-span-4 text-center">
          <div>
            <span class="material-symbols-outlined text-6xl text-slate-300 mb-4 block">view_kanban</span>
            <h3 class="text-lg font-bold text-slate-600 mb-2">No project selected</h3>
            <p class="text-slate-400 text-sm mb-6">Go back to Dashboard and open a project.</p>
            <a href="../project_dashboard/code.html" class="btn-primary px-6 py-3 text-sm inline-flex items-center gap-2">
              <span class="material-symbols-outlined text-sm">arrow_back</span> Dashboard
            </a>
          </div>
        </div>`;
        }

        function columnHTML(col, tasks) {
            const cards = tasks.length
                ? tasks.map(t => taskCardHTML(t)).join('')
                : `<div class="text-center py-8 text-slate-300">
            <span class="material-symbols-outlined text-4xl mb-2 block">inbox</span>
            <p class="text-xs font-semibold">No tasks</p>
          </div>`;

            return `
      <div class="w-[300px] flex flex-col gap-3 flex-shrink-0 h-full">
        <div class="flex items-center justify-between px-1">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full ${col.dot}"></span>
            <h3 class="font-bold text-slate-700 uppercase text-xs tracking-widest">${col.label}</h3>
            <span class="text-[10px] px-1.5 py-0.5 rounded-md font-bold ${col.countBg}">${tasks.length}</span>
          </div>
          <button onclick="openNewTaskModal('${col.status}')" class="text-slate-400 hover:text-primary transition-colors w-6 h-6 rounded-full hover:bg-slate-100 flex items-center justify-center">
            <span class="material-symbols-outlined text-base">add</span>
          </button>
        </div>
        <div class="flex-1 bg-surface-container-low rounded-2xl p-3 space-y-3 overflow-y-auto custom-scrollbar column-drop-zone min-h-[120px]" data-status="${col.status}">
          ${cards}
        </div>
      </div>`;
        }

        function taskCardHTML(t) {
            const priority = t.priority || 'MEDIUM';
            const due = t.due_date ? new Date(t.due_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
            const overdue = t.due_date && new Date(t.due_date) < new Date() && t.status !== 'DONE';
            const doneStyle = t.status === 'DONE' ? 'opacity-60' : '';

            return `
      <div class="task-card bg-white p-4 rounded-xl shadow-sm cursor-pointer group relative ${doneStyle}"
           draggable="true"
           data-task-id="${t.id}"
           onclick="openTaskModal('${t.id}')">
        <div class="flex justify-between items-start mb-2">
          <span class="text-[10px] font-black uppercase tracking-tight px-2 py-0.5 rounded priority-badge-${priority}">${priority}</span>
          <button class="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-slate-600 transition-all -mt-0.5 -mr-1" onclick="event.stopPropagation(); deleteTask('${t.id}')">
            <span class="material-symbols-outlined text-sm">close</span>
          </button>
        </div>
        <h4 class="text-sm font-bold text-slate-900 leading-tight ${t.status === 'DONE' ? 'line-through' : ''}">${escHtml(t.title)}</h4>
        ${t.description ? `<p class="text-xs text-slate-400 mt-1 line-clamp-2">${escHtml(t.description)}</p>` : ''}
        <div class="flex items-center justify-between mt-3">
          <div class="flex items-center gap-1.5">
            ${typeIcon(t.type)}
            ${due ? `<span class="text-[10px] font-semibold ${overdue ? 'text-red-500' : 'text-slate-400'} flex items-center gap-0.5">
              <span class="material-symbols-outlined text-[11px]">schedule</span>${due}
            </span>` : ''}
          </div>
          ${t.assignee_id ? `<div class="w-5 h-5 rounded-full flex items-center justify-center text-white text-[9px] font-bold" style="background:linear-gradient(135deg,#0051ae,#0969da)">${assigneeInitial(t.assignee_id)}</div>` : ''}
        </div>
      </div>`;
        }

        function typeIcon(type) {
            const icons = { TASK: 'task_alt', BUG: 'bug_report', FEATURE: 'auto_awesome', IMPROVEMENT: 'trending_up', EPIC: 'bolt' };
            const colors = { TASK: 'text-slate-400', BUG: 'text-red-400', FEATURE: 'text-blue-400', IMPROVEMENT: 'text-green-500', EPIC: 'text-purple-500' };
            return `<span class="material-symbols-outlined text-sm ${colors[type] || 'text-slate-400'}">${icons[type] || 'task_alt'}</span>`;
        }

        function assigneeInitial(uid) {
            const member = projectMembers.find(m => m.user_id === uid);
            return (member?.full_name || member?.email || 'U')[0].toUpperCase();
        }

        function addColumnBtn() {
            return `<button class="w-[260px] flex-shrink-0 h-fit border-2 border-dashed border-slate-200 rounded-2xl p-8 flex flex-col items-center justify-center gap-2 text-slate-400 hover:border-primary/40 hover:text-primary transition-all group">
        <span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">add_circle</span>
        <span class="text-xs font-bold uppercase tracking-widest">Add Column</span>
      </button>`;
        }

        // ── Drag & Drop ──
        function setupDragDrop() {
            document.querySelectorAll('[draggable="true"]').forEach(card => {
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', card.dataset.taskId);
                    card.classList.add('dragging');
                });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
            });

            document.querySelectorAll('.column-drop-zone').forEach(zone => {
                zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    const taskId = e.dataTransfer.getData('text/plain');
                    const newStatus = zone.dataset.status;
                    const task = allTasks.find(t => t.id === taskId);
                    if (task && task.status !== newStatus) {
                        task.status = newStatus;
                        renderBoard();
                        try {
                            await ApiService.updateTaskStatus(taskId, newStatus);
                            showToast(`Moved to ${newStatus.replace('_', ' ')}`, 'success');
                        } catch (e) {
                            showToast('Failed to update status', 'error');
                        }
                    }
                });
            });
        }

        // ── Task Modal ──
        async function openTaskModal(taskId) {
            currentTaskId = taskId;
            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('modal-title').textContent = task.title;
            document.getElementById('modal-status').value = task.status;
            document.getElementById('modal-priority').value = task.priority;
            document.getElementById('modal-type').value = task.type || 'TASK';
            document.getElementById('modal-description').value = task.description || '';
            document.getElementById('modal-due-date').value = task.due_date ? task.due_date.substring(0, 10) : '';
            document.getElementById('modal-assignee').value = task.assignee_id || '';

            document.getElementById('task-modal').classList.remove('hidden');
            document.getElementById('comments-list').innerHTML = '<p class="text-xs text-slate-400">Loading…</p>';

            loadComments(taskId);
        }

        function closeTaskModal() {
            document.getElementById('task-modal').classList.add('hidden');
            currentTaskId = null;
        }

        async function updateTaskField(field, value) {
            if (!currentTaskId) return;
            const task = allTasks.find(t => t.id === currentTaskId);
            if (!task) return;
            let sendValue = value;
            if (field === 'due_date' && value && !value.includes('T')) {
                sendValue = value + 'T00:00:00';
            }

            if (task[field] === sendValue) return;
            task[field] = sendValue;
            renderBoard();

            try {
                await ApiService.updateTask(currentTaskId, { [field]: sendValue });
            } catch (e) {
                showToast('Failed to save change', 'error');
            }
        }

        async function deleteCurrentTask() {
            if (!currentTaskId) return;
            if (!confirm('Delete this task?')) return;
            await deleteTask(currentTaskId);
            closeTaskModal();
        }

        async function deleteTask(taskId) {
            try {
                await ApiService.deleteTask(taskId);
                allTasks = allTasks.filter(t => t.id !== taskId);
                renderBoard();
                showToast('Task deleted.', 'info');
            } catch (e) {
                showToast('Failed to delete task: ' + e.message, 'error');
            }
        }

        // ── Comments ──
        async function loadComments(taskId) {
            const list = document.getElementById('comments-list');
            try {
                const data = await ApiService.getComments(taskId);
                const comments = Array.isArray(data) ? data : (data?.content || []);
                if (!comments.length) {
                    list.innerHTML = '<p class="text-xs text-slate-400 text-center py-2">No comments yet.</p>';
                    return;
                }
                list.innerHTML = comments.map(c => `
          <div class="flex gap-3">
            <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background:linear-gradient(135deg,#0051ae,#0969da)">${(c.full_name || c.email || 'U')[0].toUpperCase()}</div>
            <div class="flex-1 bg-surface-container-low rounded-xl px-3 py-2">
              <div class="flex items-center justify-between mb-1">
                <span class="text-xs font-bold text-slate-800">${escHtml(c.full_name || c.email || 'User')}</span>
                <span class="text-[10px] text-slate-400">${timeAgo(c.created_at)}</span>
              </div>
              <p class="text-sm text-slate-700">${escHtml(c.content)}</p>
            </div>
          </div>`).join('');
            } catch (e) {
                list.innerHTML = '<p class="text-xs text-red-400 text-center py-2">Could not load comments.</p>';
            }
        }

        async function submitComment() {
            const input = document.getElementById('comment-input');
            const content = input.value.trim();
            if (!content || !currentTaskId) return;
            input.value = '';
            try {
                await ApiService.createComment(currentTaskId, content);
                loadComments(currentTaskId);
            } catch (e) {
                showToast('Failed to post comment', 'error');
                input.value = content;
            }
        }

        // ── New Task Modal ──
        function openNewTaskModal(defaultStatus) {
            newTaskDefaultStatus = defaultStatus || 'TODO';
            document.getElementById('new-task-status').value = newTaskDefaultStatus;
            document.getElementById('new-task-modal').classList.remove('hidden');
            document.getElementById('new-task-title').focus();
        }
        function closeNewTaskModal() {
            document.getElementById('new-task-modal').classList.add('hidden');
            document.getElementById('new-task-error').classList.add('hidden');
            ['new-task-title', 'new-task-desc', 'new-task-due'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('new-task-priority').value = 'MEDIUM';
            document.getElementById('new-task-type').value = 'TASK';
        }

        async function createTask() {
            const title = document.getElementById('new-task-title').value.trim();
            if (!title) {
                const err = document.getElementById('new-task-error');
                err.textContent = 'Title is required.';
                err.classList.remove('hidden');
                return;
            }
            const btn = document.getElementById('create-task-btn');
            btn.disabled = true; btn.textContent = 'Creating…';

            try {
                const rawDate = document.getElementById('new-task-due').value;
                const dueDate = rawDate ? rawDate + 'T00:00:00' : null;

                const payload = {
                    title,
                    description: document.getElementById('new-task-desc').value.trim(),
                    status: document.getElementById('new-task-status').value,
                    priority: document.getElementById('new-task-priority').value,
                    type: document.getElementById('new-task-type').value,
                    due_date: dueDate,
                };
                const task = await ApiService.createTask(projectId, payload);
                allTasks.unshift(task);
                renderBoard();
                closeNewTaskModal();
                showToast('Task created!', 'success');
            } catch (e) {
                const err = document.getElementById('new-task-error');
                err.textContent = e.message;
                err.classList.remove('hidden');
            } finally {
                btn.disabled = false; btn.textContent = 'Create Task';
            }
        }

        // ── Close modals on overlay click ──
        document.getElementById('task-modal').addEventListener('click', function (e) {
            if (e.target === this) closeTaskModal();
        });
        document.getElementById('new-task-modal').addEventListener('click', function (e) {
            if (e.target === this) closeNewTaskModal();
        });

        // ── Utilities ──
        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Date.now() - new Date(dateStr).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            return `${Math.floor(h / 24)}d ago`;
        }
        function showToast(msg, type = 'success') {
            const c = { success: '#006226', error: '#ba1a1a', info: '#0051ae' };
            const t = document.createElement('div');
            t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:12px;background:${c[type]};color:#fff;font-size:13px;font-weight:600;font-family:Inter,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.15);transition:opacity .3s;`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }
        function requireAuth() { if (!AuthService.isAuthenticated()) { window.location.href = '../authentication/code.html'; return false; } return true; }

        function renderSidebarEl() {
            const user = AuthService.getUser();
            const initial = (user.fullName || user.email || 'U')[0].toUpperCase();
            const links = [
                { icon: 'dashboard', label: 'Dashboard', page: 'dashboard', href: '../project_dashboard/code.html' },
                { icon: 'view_kanban', label: 'Kanban Board', page: 'kanban', href: '../kanban_board/code.html' },
                { icon: 'assignment', label: 'My Tasks', page: 'tasks', href: '../kanban_board/code.html' },
                { icon: 'chat_bubble', label: 'Messages', page: 'messages', href: '#' },
                { icon: 'notifications', label: 'Notifications', page: 'notifications', href: '#' },
            ].map(l => `<a href="${l.href}" class="sidebar-link ${l.page === 'kanban' ? 'active' : ''}">` +
                `<span class="material-symbols-outlined text-xl">${l.icon}</span>${l.label}</a>`).join('');
            document.getElementById('sidebar-container').innerHTML =
                `<aside class="h-screen w-64 fixed left-0 top-0 bg-slate-50 flex flex-col p-4 z-50" style="border-right:1px solid #f1f5f9;">
          <div class="mb-6 px-2 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#0051ae,#0969da)">
              <span class="material-symbols-outlined text-white text-sm">rocket_launch</span>
            </div>
            <div><h2 class="text-lg font-black text-blue-700 leading-none">Dynblath</h2><p class="text-[10px] uppercase tracking-widest text-slate-400 mt-0.5">Premium Tier</p></div>
          </div>
          <nav class="flex-1 space-y-0.5">${links}</nav>
          <div class="pt-4" style="border-top:1px solid #f1f5f9;">
            <div class="flex items-center gap-3 px-3 py-2">
              <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:linear-gradient(135deg,#0051ae,#0969da)">${initial}</div>
              <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-slate-800 truncate">${user.fullName || 'User'}</p><p class="text-[11px] text-slate-400 truncate">${user.email || ''}</p></div>
              <button onclick="AuthService.logout()" class="text-slate-400 hover:text-red-500 transition-colors" title="Logout"><span class="material-symbols-outlined text-lg">logout</span></button>
            </div>
          </div>
        </aside>`;
        }
    </script>
</body>

</html>
