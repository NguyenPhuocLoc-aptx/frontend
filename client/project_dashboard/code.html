<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynblath | Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container-high": "#e0e9f5", "outline-variant": "#c2c6d6", "primary-fixed-dim": "#adc6ff", "surface-container-low": "#ecf4ff", "surface-container": "#e6effa", "secondary": "#5a5f66", "background": "#f7f9ff", "tertiary": "#006226", "surface-dim": "#d2dbe6", "on-primary": "#ffffff", "error": "#ba1a1a", "primary": "#0051ae", "on-surface-variant": "#424753", "surface": "#f7f9ff", "primary-fixed": "#d8e2ff", "surface-container-highest": "#dae3ef", "on-surface": "#141c25", "outline": "#727785", "error-container": "#ffdad6", "tertiary-container": "#007e33", "surface-container-lowest": "#ffffff", "surface-variant": "#dae3ef", "primary-container": "#0969da", "on-background": "#141c25", "secondary-container": "#dee3eb", "tertiary-fixed-dim": "#6bde80" }, borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" }, fontFamily: { headline: ["Inter"], body: ["Inter"] } } } }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .625rem 1rem;
            border-radius: .5rem;
            transition: all .15s;
            font-size: .875rem;
            font-weight: 600;
            color: #475569;
            text-decoration: none;
        }

        .sidebar-link:hover {
            background: #f1f5f9;
        }

        .sidebar-link.active {
            background: rgba(219, 234, 254, .6);
            color: #1d4ed8;
        }

        .card {
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(20, 28, 37, .04);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0051ae, #0969da);
            color: #fff;
            border: none;
            border-radius: .5rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: transform .15s;
        }

        .btn-primary:hover {
            transform: scale(.98);
        }

        .badge {
            display: inline-block;
            font-size: .625rem;
            font-weight: 800;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: .125rem .5rem;
            border-radius: .25rem;
        }

        .input-field {
            width: 100%;
            padding: .75rem 1rem;
            background: #ecf4ff;
            border: none;
            border-radius: .5rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            color: #141c25;
            transition: background .2s;
        }

        .input-field:focus {
            background: #dae3ef;
        }

        .priority-LOW {
            background: #f1f5f9;
            color: #475569;
        }

        .priority-MEDIUM {
            background: #fff7ed;
            color: #c2410c;
        }

        .priority-HIGH {
            background: #fee2e2;
            color: #b91c1c;
        }

        .priority-URGENT {
            background: #fecaca;
            color: #7f1d1d;
        }

        .status-PLANNING {
            background: #f1f5f9;
            color: #475569;
        }

        .status-IN_PROGRESS {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-ON_HOLD {
            background: #fef9c3;
            color: #a16207;
        }

        .status-COMPLETED {
            background: #dcfce7;
            color: #166534;
        }

        .status-CANCELLED {
            background: #fee2e2;
            color: #b91c1c;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex">

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <main class="ml-64 flex-1 flex flex-col min-h-screen">
        <!-- Top Bar -->
        <header class="sticky top-0 z-40 px-8 py-4 flex items-center justify-between"
            style="background:rgba(247,249,255,.85);backdrop-filter:blur(24px);">
            <div>
                <h1 class="text-2xl font-black text-slate-900" id="workspace-title">My Workspace</h1>
                <p class="text-sm text-slate-500 mt-0.5">Good morning — here's what needs attention today.</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openNewProjectModal()" class="btn-primary px-5 py-2.5 text-sm flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">add</span> New Project
                </button>
                <button id="notif-btn"
                    class="relative w-10 h-10 rounded-xl bg-surface-container-low flex items-center justify-center text-slate-500 hover:bg-surface-container transition-colors"
                    onclick="toggleNotifications()">
                    <span class="material-symbols-outlined">notifications</span>
                    <span id="notif-badge"
                        class="hidden absolute -top-1 -right-1 w-4 h-4 bg-error rounded-full text-white text-[9px] flex items-center justify-center font-bold"></span>
                </button>
            </div>
        </header>

        <!-- Notifications Dropdown -->
        <div id="notif-panel" class="hidden fixed top-16 right-6 z-50 w-80 bg-white rounded-2xl shadow-2xl p-4"
            style="box-shadow:0 20px 60px rgba(20,28,37,.12);">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-slate-900 text-sm">Notifications</h3>
                <button onclick="markAllRead()" class="text-xs text-primary font-semibold hover:underline">Mark all
                    read</button>
            </div>
            <div id="notif-list" class="space-y-2 max-h-72 overflow-y-auto"></div>
        </div>

        <!-- Stats Row -->
        <section class="px-8 py-4 grid grid-cols-4 gap-4">
            <div class="card p-6 flex flex-col gap-2">
                <span class="material-symbols-outlined text-primary text-2xl">folder_copy</span>
                <p class="text-3xl font-black text-slate-900" id="stat-projects">—</p>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Projects</p>
            </div>
            <div class="card p-6 flex flex-col gap-2">
                <span class="material-symbols-outlined text-blue-500 text-2xl">assignment</span>
                <p class="text-3xl font-black text-slate-900" id="stat-tasks">—</p>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Open Tasks</p>
            </div>
            <div class="card p-6 flex flex-col gap-2">
                <span class="material-symbols-outlined text-orange-500 text-2xl">schedule</span>
                <p class="text-3xl font-black text-slate-900" id="stat-due">—</p>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Due Today</p>
            </div>
            <div class="card p-6 flex flex-col gap-2">
                <span class="material-symbols-outlined text-tertiary text-2xl">check_circle</span>
                <p class="text-3xl font-black text-slate-900" id="stat-done">—</p>
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Completed</p>
            </div>
        </section>

        <!-- Projects Grid -->
        <section class="px-8 pb-8 flex-1">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-extrabold text-slate-900">Projects</h2>
                <div class="flex gap-2">
                    <select id="filter-status"
                        class="text-xs px-3 py-2 rounded-xl bg-surface-container-low border-none outline-none font-semibold text-slate-600"
                        onchange="renderProjects()">
                        <option value="">All Status</option>
                        <option value="PLANNING">Planning</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="ON_HOLD">On Hold</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                    <select id="filter-priority"
                        class="text-xs px-3 py-2 rounded-xl bg-surface-container-low border-none outline-none font-semibold text-slate-600"
                        onchange="renderProjects()">
                        <option value="">All Priority</option>
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                        <option value="URGENT">Urgent</option>
                    </select>
                </div>
            </div>

            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- Skeleton -->
                <div class="card p-6 animate-pulse">
                    <div class="h-4 bg-slate-100 rounded mb-3 w-2/3"></div>
                    <div class="h-3 bg-slate-100 rounded mb-2 w-full"></div>
                    <div class="h-3 bg-slate-100 rounded w-1/2"></div>
                </div>
                <div class="card p-6 animate-pulse">
                    <div class="h-4 bg-slate-100 rounded mb-3 w-2/3"></div>
                    <div class="h-3 bg-slate-100 rounded mb-2 w-full"></div>
                    <div class="h-3 bg-slate-100 rounded w-1/2"></div>
                </div>
                <div class="card p-6 animate-pulse">
                    <div class="h-4 bg-slate-100 rounded mb-3 w-2/3"></div>
                    <div class="h-3 bg-slate-100 rounded mb-2 w-full"></div>
                    <div class="h-3 bg-slate-100 rounded w-1/2"></div>
                </div>
            </div>

            <div id="empty-projects" class="hidden flex flex-col items-center justify-center py-20 text-center">
                <span class="material-symbols-outlined text-6xl text-slate-300 mb-4">folder_open</span>
                <h3 class="text-lg font-bold text-slate-600 mb-2">No projects yet</h3>
                <p class="text-slate-400 text-sm mb-6">Create your first project to get started.</p>
                <button onclick="openNewProjectModal()" class="btn-primary px-6 py-3 text-sm">Create Project</button>
            </div>
        </section>
    </main>

    <!-- FAB -->
    <button onclick="openNewProjectModal()"
        class="fixed bottom-8 right-8 w-14 h-14 btn-primary rounded-full flex items-center justify-center shadow-2xl md:hidden"
        style="box-shadow:0 12px 32px rgba(0,81,174,.4);">
        <span class="material-symbols-outlined text-2xl">add</span>
    </button>

    <!-- New Project Modal -->
    <div id="new-project-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center"
        style="background:rgba(20,28,37,.45);backdrop-filter:blur(8px);">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg mx-4 p-8" style="max-height:90vh;overflow-y:auto;">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-extrabold text-slate-900">New Project</h2>
                <button onclick="closeNewProjectModal()" class="text-slate-400 hover:text-slate-600">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div id="modal-error"
                class="hidden mb-4 bg-error-container text-red-800 text-sm font-semibold px-4 py-3 rounded-xl"></div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Project Name
                        *</label>
                    <input id="new-proj-name" class="input-field" placeholder="e.g. Platform Redesign" type="text" />
                </div>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Description</label>
                    <textarea id="new-proj-desc" class="input-field resize-none"
                        placeholder="What is this project about?" rows="3"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Priority</label>
                        <select id="new-proj-priority" class="input-field">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                            <option value="URGENT">Urgent</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Category</label>
                        <input id="new-proj-category" class="input-field" placeholder="e.g. Engineering" type="text" />
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Start
                            Date</label>
                        <input id="new-proj-start" class="input-field" type="date" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">End
                            Date</label>
                        <input id="new-proj-end" class="input-field" type="date" />
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button onclick="closeNewProjectModal()"
                        class="px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
                    <button id="create-proj-btn" onclick="createProject()"
                        class="btn-primary px-6 py-2.5 text-sm">Create Project</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../auth.js"></script>
    <script src="../api.js"></script>
    <script>
        // ── State ──
        let allProjects = [];
        let workspaceId = null;
        let notificationsData = [];

        // ── Init ──
        document.addEventListener('DOMContentLoaded', async () => {
            if (!requireAuth()) return;

            document.getElementById('sidebar-container').innerHTML = renderSidebar('dashboard');

            await Promise.all([loadWorkspace(), loadNotifications()]);
        });

        async function loadWorkspace() {
            try {
                const workspaces = await ApiService.getWorkspaces();
                if (workspaces && workspaces.length > 0) {
                    workspaceId = workspaces[0].id;
                    document.getElementById('workspace-title').textContent = workspaces[0].name;
                    await loadProjects();
                } else {
                    const ws = await ApiService.createWorkspace({
                        name: 'My Workspace',
                        slug: 'my-workspace-' + Date.now()
                    });
                    if (ws && ws.id) {
                        workspaceId = ws.id;
                        document.getElementById('workspace-title').textContent = ws.name;
                    }
                    renderEmptyProjects();
                }
            } catch (e) {
                console.error('loadWorkspace error:', e);
                renderEmptyProjects();
            }
        }

        async function loadProjects() {
            try {
                const data = await ApiService.getProjects(workspaceId);
                allProjects = Array.isArray(data) ? data : (data?.content || []);
                updateStats();
                renderProjects();
            } catch (e) {
                console.error('loadProjects error:', e);
                renderEmptyProjects();
            }
        }

        function updateStats() {
            document.getElementById('stat-projects').textContent = allProjects.length;
            // These would normally come from tasks API; placeholders
            document.getElementById('stat-tasks').textContent = '—';
            document.getElementById('stat-due').textContent = '—';
            document.getElementById('stat-done').textContent = allProjects.filter(p => p.status === 'COMPLETED').length;
        }

        function renderProjects() {
            const statusFilter = document.getElementById('filter-status').value;
            const priorityFilter = document.getElementById('filter-priority').value;

            let filtered = allProjects.filter(p => {
                if (statusFilter && p.status !== statusFilter) return false;
                if (priorityFilter && p.priority !== priorityFilter) return false;
                return true;
            });

            const grid = document.getElementById('projects-grid');
            const empty = document.getElementById('empty-projects');

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            grid.innerHTML = filtered.map(p => projectCard(p)).join('');
        }

        function renderEmptyProjects() {
            document.getElementById('projects-grid').innerHTML = '';
            document.getElementById('empty-projects').classList.remove('hidden');
            document.getElementById('stat-projects').textContent = '0';
            document.getElementById('stat-tasks').textContent = '0';
            document.getElementById('stat-due').textContent = '0';
            document.getElementById('stat-done').textContent = '0';
        }

        function projectCard(p) {
            const progress = p.progress || 0;
            const priorityClass = `priority-${p.priority}`;
            const statusClass = `status-${p.status}`;
            const end = p.end_date ? new Date(p.end_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';

            return `
      <div class="card p-6 flex flex-col gap-4 cursor-pointer hover:shadow-lg transition-shadow group" onclick="openProject('${p.id}')">
        <div class="flex items-start justify-between">
          <div class="flex flex-col gap-2">
            <span class="badge ${priorityClass}">${p.priority}</span>
            <h3 class="font-extrabold text-slate-900 text-base leading-tight">${escHtml(p.name)}</h3>
          </div>
          <button class="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-slate-600 transition-all" onclick="event.stopPropagation(); openProjectMenu('${p.id}', this)">
            <span class="material-symbols-outlined text-lg">more_horiz</span>
          </button>
        </div>
        ${p.description ? `<p class="text-sm text-slate-500 line-clamp-2">${escHtml(p.description)}</p>` : ''}
        <div class="mt-auto">
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-bold text-slate-600">${progress}%</span>
            <span class="text-[10px] font-semibold text-slate-400">Due ${end}</span>
          </div>
          <div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
            <div class="h-full rounded-full" style="width:${progress}%;background:linear-gradient(90deg,#0051ae,#0969da)"></div>
          </div>
          <div class="mt-3 flex items-center justify-between">
            <span class="badge ${statusClass}">${p.status.replace('_', ' ')}</span>
          </div>
        </div>
      </div>`;
        }

        function openProject(id) {
            // Store current project id for kanban
            localStorage.setItem('currentProjectId', id);
            window.location.href = '../kanban_board/code.html';
        }

        function openProjectMenu(id, btn) {
            const existing = document.getElementById('project-context-menu');
            if (existing) existing.remove();
            const menu = document.createElement('div');
            menu.id = 'project-context-menu';
            menu.className = 'absolute z-50 bg-white rounded-xl shadow-xl py-1 w-40';
            menu.style.cssText = 'box-shadow:0 8px 32px rgba(20,28,37,.12);';
            menu.innerHTML = `
        <button class="w-full px-4 py-2 text-sm text-left text-slate-700 hover:bg-slate-50 flex items-center gap-2" onclick="openProject('${id}')">
          <span class="material-symbols-outlined text-sm">view_kanban</span> Open Board
        </button>
        <button class="w-full px-4 py-2 text-sm text-left text-red-600 hover:bg-red-50 flex items-center gap-2" onclick="deleteProjectConfirm('${id}')">
          <span class="material-symbols-outlined text-sm">delete</span> Delete
        </button>`;
            const rect = btn.getBoundingClientRect();
            menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
            menu.style.right = (window.innerWidth - rect.right) + 'px';
            document.body.appendChild(menu);
            setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 0);
        }

        async function deleteProjectConfirm(id) {
            if (!confirm('Delete this project? All tasks will be permanently removed.')) return;
            try {
                await ApiService.deleteProject(id);
                allProjects = allProjects.filter(p => p.id !== id);
                renderProjects();
                updateStats();
                showToast('Project deleted.', 'info');
            } catch (e) {
                showToast('Failed to delete project: ' + e.message, 'error');
            }
        }

        // ── New Project Modal ──
        function openNewProjectModal() {
            document.getElementById('new-project-modal').classList.remove('hidden');
            document.getElementById('new-proj-name').focus();
        }
        function closeNewProjectModal() {
            document.getElementById('new-project-modal').classList.add('hidden');
            document.getElementById('modal-error').classList.add('hidden');
            ['new-proj-name', 'new-proj-desc', 'new-proj-category', 'new-proj-start', 'new-proj-end'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('new-proj-priority').value = 'MEDIUM';
        }

        async function createProject() {
            if (!workspaceId) {
                const err = document.getElementById('modal-error');
                err.textContent = 'Workspace not loaded. Please refresh the page.';
                err.classList.remove('hidden');
                return;
            }
            const name = document.getElementById('new-proj-name').value.trim();
            if (!name) {
                const err = document.getElementById('modal-error');
                err.textContent = 'Project name is required.';
                err.classList.remove('hidden');
                return;
            }
            const btn = document.getElementById('create-proj-btn');
            btn.disabled = true; btn.textContent = 'Creating…';

            try {
                const payload = {
                    name,
                    description: document.getElementById('new-proj-desc').value.trim(),
                    priority: document.getElementById('new-proj-priority').value,
                    category: document.getElementById('new-proj-category').value.trim(),
                    start_date: document.getElementById('new-proj-start').value || null,
                    end_date: document.getElementById('new-proj-end').value || null,
                };
                const project = await ApiService.createProject(workspaceId, payload);
                allProjects.unshift(project);
                renderProjects();
                updateStats();
                closeNewProjectModal();
                showToast('Project created!', 'success');
            } catch (e) {
                const err = document.getElementById('modal-error');
                err.textContent = e.message;
                err.classList.remove('hidden');
            } finally {
                btn.disabled = false; btn.textContent = 'Create Project';
            }
        }

        // ── Notifications ──
        async function loadNotifications() {
            try {
                const data = await ApiService.getNotifications();
                notificationsData = Array.isArray(data) ? data : (data?.content || []);
                const unread = notificationsData.filter(n => !n.is_read).length;
                const badge = document.getElementById('notif-badge');
                if (unread > 0) {
                    badge.textContent = unread > 9 ? '9+' : unread;
                    badge.classList.remove('hidden');
                }
                renderNotifications();
            } catch (e) { /* notifications non-critical */ }
        }

        function renderNotifications() {
            const list = document.getElementById('notif-list');
            if (!notificationsData.length) {
                list.innerHTML = '<p class="text-xs text-slate-400 text-center py-4">No notifications</p>';
                return;
            }
            list.innerHTML = notificationsData.slice(0, 10).map(n => `
        <div class="flex gap-3 p-2.5 rounded-xl ${n.is_read ? '' : 'bg-blue-50'} cursor-pointer hover:bg-slate-50 transition-colors" onclick="markRead('${n.id}', this)">
          <div class="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${n.is_read ? 'bg-slate-200' : 'bg-primary'}"></div>
          <div>
            <p class="text-xs font-semibold text-slate-800">${escHtml(n.message)}</p>
            <p class="text-[11px] text-slate-400 mt-0.5">${timeAgo(n.created_at)}</p>
          </div>
        </div>`).join('');
        }

        function toggleNotifications() {
            document.getElementById('notif-panel').classList.toggle('hidden');
        }

        async function markRead(id, el) {
            try {
                await ApiService.markNotificationRead(id);
                el.classList.remove('bg-blue-50');
                el.querySelector('.rounded-full').classList.replace('bg-primary', 'bg-slate-200');
            } catch (e) { }
        }

        async function markAllRead() {
            try {
                await ApiService.markAllRead();
                notificationsData = notificationsData.map(n => ({ ...n, is_read: true }));
                document.getElementById('notif-badge').classList.add('hidden');
                renderNotifications();
            } catch (e) { }
        }

        // close notifications on outside click
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('notif-panel');
            const btn = document.getElementById('notif-btn');
            if (!panel.contains(e.target) && !btn.contains(e.target)) panel.classList.add('hidden');
        });

        // ── Utilities ──
        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Date.now() - new Date(dateStr).getTime();
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            return `${Math.floor(h / 24)}d ago`;
        }
        function showToast(msg, type = 'success') {
            const c = { success: '#006226', error: '#ba1a1a', info: '#0051ae' };
            const t = document.createElement('div');
            t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:12px;background:${c[type]};color:#fff;font-size:13px;font-weight:600;font-family:Inter,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.15);transition:opacity .3s;`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }
        function renderSidebar(active) {
            const user = AuthService.getUser();
            const initial = (user.fullName || user.email || 'U')[0].toUpperCase();
            const links = [
                { icon: 'dashboard', label: 'Dashboard', page: 'dashboard', href: '../project_dashboard/code.html' },
                { icon: 'view_kanban', label: 'Kanban Board', page: 'kanban', href: '../kanban_board/code.html' },
                { icon: 'assignment', label: 'My Tasks', page: 'tasks', href: '../kanban_board/code.html' },
                { icon: 'chat_bubble', label: 'Messages', page: 'messages', href: '#' },
                { icon: 'notifications', label: 'Notifications', page: 'notifications', href: '#' },
            ].map(l => `<a href="${l.href}" class="sidebar-link ${l.page === active ? 'active' : ''}">` +
                `<span class="material-symbols-outlined text-xl">${l.icon}</span>${l.label}</a>`).join('');
            return `<aside class="h-screen w-64 fixed left-0 top-0 bg-slate-50 flex flex-col p-4 z-50" style="border-right:1px solid #f1f5f9;">
        <div class="mb-6 px-2 flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#0051ae,#0969da)">
            <span class="material-symbols-outlined text-white text-sm">rocket_launch</span>
          </div>
          <div><h2 class="text-lg font-black text-blue-700 leading-none">Dynblath</h2><p class="text-[10px] uppercase tracking-widest text-slate-400 mt-0.5">Premium Tier</p></div>
        </div>
        <nav class="flex-1 space-y-0.5">${links}</nav>
        <div class="pt-4" style="border-top:1px solid #f1f5f9;">
          <div class="flex items-center gap-3 px-3 py-2">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:linear-gradient(135deg,#0051ae,#0969da)">${initial}</div>
            <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-slate-800 truncate">${user.fullName || 'User'}</p><p class="text-[11px] text-slate-400 truncate">${user.email || ''}</p></div>
            <button onclick="AuthService.logout()" class="text-slate-400 hover:text-red-500 transition-colors" title="Logout"><span class="material-symbols-outlined text-lg">logout</span></button>
          </div>
        </div>
      </aside>`;
        }
        function requireAuth() { if (!AuthService.isAuthenticated()) { window.location.href = '../authentication/code.html'; return false; } return true; }
    </script>
